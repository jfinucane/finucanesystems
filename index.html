<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finucane Systems — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f14;
      --surface:   #131920;
      --border:    #1e2a35;
      --accent:    #4e9eff;
      --muted:     #4a6278;
      --text:      #c8d8e8;
      --bright:    #eaf2fb;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial light source */
    body::after {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vw;
      background: radial-gradient(ellipse, rgba(78,158,255,0.08) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 2rem;
      text-align: center;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      color: var(--bright);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.35em;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.4s;
    }

    .wordmark span {
      color: var(--accent);
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.6s;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      margin: 0 auto 4.5rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.8s;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.55rem);
      color: var(--text);
      max-width: 560px;
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1s;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      margin-top: 4rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.2s;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.25s, color 0.25s, background 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-btn:hover {
      border-color: var(--accent);
      color: var(--bright);
      transform: translateY(-2px);
    }

    .link-btn:hover::before {
      opacity: 0.08;
    }

    .link-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      position: relative;
    }

    .link-btn span {
      position: relative;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.75rem 2rem;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Software Architecture &amp; Consulting</p>

    <h1 class="wordmark">FinucaneSystems<span></span></h1>

    <p class="tagline">Before tomorrow became habitual</p>

    <div class="divider"></div>

    <p class="message">
      Software architecture, scalable systems design.<br> Launching soon.
    </p>
